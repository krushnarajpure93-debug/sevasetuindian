<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookMeet Pro Premium Healthcare Suite | Advanced Quantum Grid Cluster</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        medicalDark: '#010915',
                        medicalCard: '#051427',
                        medicalInput: '#020b18',
                        brandTeal: '#00e5ff',
                        brandTealHover: '#00b4d8',
                        brandEmerald: '#00e676',
                        cyberPink: '#ff007f',
                        cyberPurple: '#7b2cbf',
                        lightBg: '#f1f5f9',
                        lightCard: '#ffffff',
                        lightBorder: '#e2e8f0',
                        deepGloss: 'rgba(5, 20, 39, 0.95)'
                    },
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'Inter', 'sans-serif'],
                    },
                    animation: {
                        'pulse-glow': 'neonGlow 2.5s infinite alternate',
                        'float': 'floating 3s ease-in-out infinite',
                        'spin-slow': 'spin 8s linear infinite',
                        'marquee': 'marquee 25s linear infinite',
                    },
                    keyframes: {
                        neonGlow: {
                            'from': { boxShadow: '0 0 12px rgba(0, 229, 255, 0.2), 0 0 24px rgba(0, 229, 255, 0.1)' },
                            'to': { boxShadow: '0 0 30px rgba(0, 229, 255, 0.6), 0 0 50px rgba(0, 229, 255, 0.4)' }
                        },
                        floating: {
                            '0%, 100%': { transform: 'translateY(0px)' },
                            '50%': { transform: 'translateY(-12px)' }
                        },
                        marquee: {
                            '0%': { transform: 'translateX(0%)' },
                            '100%': { transform: 'translateX(-50%)' }
                        }
                    }
                }
            }
        }
    </script>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=300;400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            user-select: none;
            overflow-x: hidden;
        }
        .mono-text {
            font-family: 'JetBrains Mono', monospace;
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #00e5ff;
            border-radius: 10px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #010915;
        }
        .dark .glass-panel {
            background: rgba(5, 20, 39, 0.85);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.07);
        }
        .light .glass-panel {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(0, 0, 0, 0.08);
        }
        @media print {
            .no-print { display: none !important; }
            body { background: white; color: black; }
        }
    </style>
</head>

<body class="dark bg-medicalDark text-slate-100 min-h-screen custom-scrollbar transition-colors duration-300">

    <div id="bookmeet-quantum-root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const specializations = [
            "Cardiologist", "Neurologist", "Orthopedic", "Pediatrician", 
            "Dermatologist", "Dentist", "Ophthalmologist", "General Physician", 
            "Oncologist", "Gynecologist", "Urologist", "Psychiatrist", "Gastroenterologist"
        ];

        const regionalMatrix = {
            "Maharashtra": {
                "Mumbai Suburban": ["Andheri West Infrastructure Node", "Bandra Kurla Complex Grid", "Borivali East Terminal", "Ghatkopar Central Square", "Malad Cyber Node", "Powai Lake Cluster"],
                "Mumbai City": ["Colaba Terminal HQ", "Dadar Central Interchange", "Byculla Core Sector", "Lower Parel Industrial Grid", "Nariman Point Block"],
                "Pune": ["Shivajinagar Hub Centre", "Kothrud Square Complex", "Hinjawadi Phase 3 Tech Cluster", "Hadapsar Core Node", "Viman Nagar Terminal Lab", "Baramati Regional Station", "Pimpri Defense Zone"],
                "Beed": ["Beed City Center Core", "Majalgaon Sub-Hub Node", "Parli-Vaijnath Power Grid", "Georai Sector Area", "Ashti Junction Point"],
                "Thane": ["Thane West Core Terminal", "Kalyan Transport Node", "Dombivli Grid Cluster", "Mira Road Terminal Sector", "Bhiwandi Logistic Hub A"],
                "Nagpur": ["Sitabuldi Core Junction", "Dharampeth Premium Cluster", "Mihan Aero Tech Node", "Kamptee Medical Facility Line"],
                "Nashik": ["Panchavati Holy Hub Line", "Cidco Core Matrix", "Satpur Industrial Sector 4", "Malegaon High Density Grid"],
                "Chhatrapati Sambhajinagar": ["Cidco Sector 4 Complex", "Waluj Industrial Automation Grid", "Kranti Chowk High Stream Node", "Paithan Core Reserve"]
            }
        };

        const realHospitals = [
            "Kokilaben Dhirubhai Ambani Hospital, Mumbai",
            "Apollo Hospitals, Navi Mumbai",
            "Lilavati Hospital & Research Centre, Mumbai",
            "Fortis Hospital, Mulund Cluster",
            "Sir H. N. Reliance Foundation Hospital, Mumbai Tower",
            "Ruby Hall Clinic, Pune Hub",
            "KEM Hospital, Pune Medical College",
            "Sahyadri Super Speciality Hospital, Pune Core",
            "Jupiter Hospital, Thane West",
            "Wockhardt Hospitals, Nagpur Cluster",
            "Civil General Hospital, Beed Internal Grid",
            "Government Medical College (GMC), Chhatrapati Sambhajinagar"
        ];

        const staticDoctors = [];
        const doctorFirstNames = ["Aniruddh", "Shalini", "Vikram", "Radhika", "Jayesh", "Tanvi", "Sandeep", "Meera", "Prakash", "Sanjay", "Deepak", "Aishwarya", "Rohan", "Snehal", "Abhijit"];
        const doctorLastNames = ["Patil", "Deshmukh", "Malhotra", "Nair", "Ranade", "Kulkarni", "Joshi", "Shah", "Amte", "Borude", "Mhaske", "Tambe", "Shinde", "Pawar", "Ghadge"];

        for (let i = 1; i <= 60; i++) {
            const specIndex = i % specializations.length;
            const hospIndex = i % realHospitals.length;
            const distKeys = Object.keys(regionalMatrix["Maharashtra"]);
            const distKey = distKeys[i % distKeys.length];
            const nodes = regionalMatrix["Maharashtra"][distKey];
            const selectedNode = nodes[i % nodes.length];

            staticDoctors.push({
                id: i,
                name: `Dr. ${doctorFirstNames[i % doctorFirstNames.length]} ${doctorLastNames[i % doctorLastNames.length]}`,
                specialization: specializations[specIndex],
                qualification: ["MD, DM (AIIMS Delhi)", "MD, DNB (NIMHANS)", "MS, MCh (Royal College UK)", "MBBS, MD Core Certified (AFMC)"][i % 4],
                hospital: realHospitals[hospIndex],
                experience: `${(i % 14) + 9} Years Active Matrix`,
                rating: (4.4 + (i % 6) * 0.1).toFixed(1),
                fees: 500 + (specIndex * 120),
                location: distKey,
                node: selectedNode,
                state: "Maharashtra",
                isPremium: i % 3 === 0,
                availability: i % 2 === 0 ? "Instant Tele-Consult" : "Physical Slots Today",
                image: `https://images.unsplash.com/photo-${["1622253692010-333f2da6031d", "1594824813573-246434de83fb", "1537368910025-700350fe46c7", "1614608682850-e0d6ed316d47", "1559839734-2b71ea197ec2"][i % 5]}?auto=format&fit=crop&w=300&h=300&q=80`,
                slots: ["09:00 AM", "11:30 AM", "02:00 PM", "04:45 PM", "07:15 PM"]
            });
        }

        const pharmacyStore = Array.from({ length: 32 }, (_, i) => {
            const products = [
                { name: "Paracetamol 650mg Active Ultra", comp: "Analgesic & Antipyretic Fast-Dissolve Formulations", brand: "Cipla Labs Grid" },
                { name: "Amoxicillin Trihydrate 500mg Matrix", comp: "Broad Spectrum Antibiotic Bacterial Blocker Core", brand: "Abbott Medical Supply" },
                { name: "Neurobion Forte Multivitamin Pack", comp: "Neural Catalyst Complex B1-B6-B12 Matrix", brand: "Merck Healthcare Group" },
                { name: "Metformin SR 1000mg Glyco-Stabilizer", comp: "Glycemic Level Bio-Management Agent Module", brand: "Sun Pharma System" },
                { name: "Pantoprazole Gastro-Resistant Capsule", comp: "Proton Pump Inhibitor Acid Release Catalyst", brand: "Dr. Reddy's Lab Block" },
                { name: "Cetirizine Hcl High Affinity Molecule", comp: "H1 Histamine Selective Blocker Compound", brand: "Lupin Corp Grid" },
                { name: "Omega-3 Pure Salmon Bio-Oil Capsules", comp: "Cardiovascular Lipid Structural System Booster", brand: "TrueNaturals Pharma" },
                { name: "Calcium Citrate Malate Plus Vit D3 Grid", comp: "Bone Architecture Calcification Regeneration Matrix", brand: "Zydus Healthcare Core" }
            ];
            const currentItem = products[i % products.length];
            const images = [
                "https://images.unsplash.com/photo-1584308666744-24d5c474f2ae?auto=format&fit=crop&w=300&h=300&q=80",
                "https://images.unsplash.com/photo-1584017911766-d451b3d0e843?auto=format&fit=crop&w=300&h=300&q=80",
                "https://images.unsplash.com/photo-1607619273114-116025667e45?auto=format&fit=crop&w=300&h=300&q=80",
                "https://images.unsplash.com/photo-1471864190281-a93a3070b6de?auto=format&fit=crop&w=300&h=300&q=80"
            ];

            return {
                id: 2000 + i,
                name: `${currentItem.name} (#BMT-${200 + i})`,
                composition: currentItem.comp,
                brand: currentItem.brand,
                rating: (4.1 + (i % 9) * 0.1).toFixed(1),
                reviewCount: 145 + (i * 22),
                price: 90 + (i * 18),
                oldPrice: 180 + (i * 30),
                discount: Math.round(((180 + i * 30 - (90 + i * 18)) / (180 + i * 30)) * 100),
                stock: (i % 6 === 0) ? 2 : 30,
                image: images[i % images.length],
                category: i % 2 === 0 ? "Rx Prescription Required Layer" : "OTC Wellness Compound Grid"
            };
        });

        function BookMeetApp() {
            const [view, setView] = useState('home');
            const [theme, setTheme] = useState('dark');
            const [cart, setCart] = useState([]);
            const [selectedDoctor, setSelectedDoctor] = useState(staticDoctors[0]);
            
            const [selectedDistrict, setSelectedDistrict] = useState('');
            const [selectedSpec, setSelectedSpec] = useState('');
            const [searchQuery, setSearchQuery] = useState('');
            const [pharmaSearch, setPharmaSearch] = useState('');
            const [visibleDocs, setVisibleDocs] = useState(8);

            const [checkoutStep, setCheckoutStep] = useState(null); 
            const [bookingStep, setBookingStep] = useState(null); 
            const [activeInfoBox, setActiveInfoBox] = useState(null);
            
            const [otpGatewayActive, setOtpGatewayActive] = useState(false);
            const [otpSentNumber, setOtpSentNumber] = useState('');
            const [userEnteredOtp, setUserEnteredOtp] = useState('');
            const [generatedSystemOtp, setGeneratedSystemOtp] = useState('');
            const [otpPurpose, setOtpPurpose] = useState(''); 

            const [shippingDetails, setShippingDetails] = useState({ name: '', phone: '', addressText: '', pincode: '', city: 'Mumbai Hub' });
            const [appointmentForm, setAppointmentForm] = useState({ patientName: '', contact: '', email: '', date: '2026-06-15', slot: '11:30 AM', mode: 'online' });
            const [paymentGate, setPaymentGate] = useState('upi');

            const [finalizedInvoice, setFinalizedInvoice] = useState(null);
            const [finalizedBooking, setFinalizedBooking] = useState(null);

            const mapQueryUrl = useMemo(() => {
                let target = "Hospitals in Maharashtra Cluster AIIMS";
                if (selectedDistrict) target = `Best Tertiary Care Hospitals in ${selectedDistrict}, Maharashtra`;
                if (selectedSpec && selectedDistrict) target = `${selectedSpec} Super Specialty Hospitals in ${selectedDistrict}, Maharashtra`;
                return `https://maps.google.com/maps?q=${encodeURIComponent(target)}&t=&z=14&ie=UTF8&iwloc=&output=embed`;
            }, [selectedDistrict, selectedSpec]);

            const addToCart = (product) => {
                setCart(prev => {
                    const exists = prev.find(item => item.id === product.id);
                    if (exists) return prev.map(item => item.id === product.id ? { ...item, qty: item.qty + 1 } : item);
                    return [...prev, { ...product, qty: 1 }];
                });
                triggerNotification(`Added to Amazon Basket: ${product.name}`);
            };

            const updateQty = (id, delta) => {
                setCart(prev => prev.map(item => {
                    if (item.id === id) {
                        const targetQty = item.qty + delta;
                        return targetQty > 0 ? { ...item, qty: targetQty } : null;
                    }
                    return item;
                }).filter(Boolean));
            };

            const cartTotal = useMemo(() => cart.reduce((sum, item) => sum + (item.price * item.qty), 0), [cart]);

            const filteredDoctors = useMemo(() => {
                return staticDoctors.filter(doc => {
                    if (selectedDistrict && doc.location !== selectedDistrict) return false;
                    if (selectedSpec && doc.specialization !== selectedSpec) return false;
                    if (searchQuery) {
                        const match = searchQuery.toLowerCase();
                        return doc.name.toLowerCase().includes(match) || doc.hospital.toLowerCase().includes(match) || doc.specialization.toLowerCase().includes(match);
                    }
                    return true;
                });
            }, [selectedDistrict, selectedSpec, searchQuery]);

            const filteredProducts = useMemo(() => {
                return pharmacyStore.filter(prod => {
                    if (!pharmaSearch) return true;
                    const query = pharmaSearch.toLowerCase();
                    return prod.name.toLowerCase().includes(query) || prod.brand.toLowerCase().includes(query) || prod.composition.toLowerCase().includes(query);
                });
            }, [pharmaSearch]);

            useEffect(() => {
                const triggerScrollGrid = () => {
                    if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 120) {
                        if (filteredDoctors.length > visibleDocs) {
                            setVisibleDocs(prev => prev + 6);
                        }
                    }
                };
                window.addEventListener('scroll', triggerScrollGrid);
                return () => window.removeEventListener('scroll', triggerScrollGrid);
            }, [filteredDoctors, visibleDocs]);

            useEffect(() => {
                document.documentElement.className = theme;
            }, [theme]);

            const triggerNotification = (msg) => {
                const toast = document.createElement('div');
                toast.className = "fixed bottom-5 right-5 z-50 bg-gradient-to-r from-brandTeal to-brandEmerald text-medicalDark font-black text-xs px-5 py-3 rounded-xl shadow-2xl tracking-wide uppercase transition-all duration-300 transform translate-y-0";
                toast.innerText = msg;
                document.body.appendChild(toast);
                setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 400); }, 2500);
            };

            const dispatchSecureOtp = (targetNumber, purpose) => {
                if (!targetNumber || targetNumber.length < 10) {
                    alert("System Framework Alert: Provide valid 10-Digit Cellular Comm Line Address.");
                    return;
                }
                const randomOtp = Math.floor(1000 + Math.random() * 9000).toString();
                setGeneratedSystemOtp(randomOtp);
                setOtpSentNumber(targetNumber);
                setOtpPurpose(purpose);
                setOtpGatewayActive(true);
                alert(`[SECURE GATEWAY OTP INTERCEPT] \nYour Dynamic BookMeet Pro Access Token Code is: ${randomOtp}\nRouting through Ayushman Bharat API Cluster...`);
            };

            const confirmOtpChallenge = () => {
                if (userEnteredOtp === generatedSystemOtp) {
                    setOtpGatewayActive(false);
                    setUserEnteredOtp('');
                    triggerNotification("Cryptographic OTP Challenge Cleared Successfully");
                    if (otpPurpose === 'booking') {
                        executeFinalBookingCommit();
                    } else if (otpPurpose === 'checkout') {
                        executeFinalCheckoutCommit();
                    }
                } else {
                    alert("Security Check Failed: Invalid Security Token OTP. Re-verify Ledger Address.");
                }
            };

            const initiateBookingOtpValidation = () => {
                if (!appointmentForm.patientName || !appointmentForm.contact || !appointmentForm.email) {
                    alert("Validation Layer Failure: Missing absolute Nominative Profile entries or Email Endpoint Gateway.");
                    return;
                }
                dispatchSecureOtp(appointmentForm.contact, 'booking');
            };

            const initiateCheckoutOtpValidation = () => {
                if (!shippingDetails.name || !shippingDetails.phone || !shippingDetails.addressText || !shippingDetails.pincode) {
                    alert("Logistics Stack Failure: Empty Receiver Identity, Communication Line, or Zip Code Matrix.");
                    return;
                }
                dispatchSecureOtp(shippingDetails.phone, 'checkout');
            };

            // ==========================================
            // ADMIN GRID SYNCHRONIZATION LINES (APPOINTMENT)
            // ==========================================
            const executeFinalBookingCommit = () => {
                const tokenSequence = Math.floor(450000 + Math.random() * 549999).toString();
                const receipt = {
                    id: tokenSequence,
                    doctor: selectedDoctor,
                    meta: appointmentForm,
                    status: "Pending",
                    timestamp: new Date().toLocaleString()
                };
                
                // Fetch existing and sync to localStorage
                let localApps = JSON.parse(localStorage.getItem("allAppointments")) || [];
                localApps.unshift(receipt);
                localStorage.setItem("allAppointments", JSON.stringify(localApps));

                setFinalizedBooking(receipt);
                setBookingStep('receipt');
            };

            // ==========================================
            // ADMIN GRID SYNCHRONIZATION LINES (PHARMACY)
            // ==========================================
            const executeFinalCheckoutCommit = () => {
                const trackingAddress = Math.floor(810000 + Math.random() * 189999).toString();
                
                // Map items structure to match admin expectations
                const mappedItems = cart.map(item => ({
                    name: item.name,
                    brand: item.brand,
                    quantity: item.qty,
                    price: item.price
                }));

                const invoice = {
                    invoiceId: trackingAddress,
                    address: {
                        name: shippingDetails.name,
                        addressText: `${shippingDetails.addressText}, ${shippingDetails.city} - ${shippingDetails.pincode}`
                    },
                    items: mappedItems,
                    subtotal: cartTotal,
                    deliveryCharge: cartTotal > 600 ? 0 : 70,
                    grandTotal: cartTotal + (cartTotal > 600 ? 0 : 70),
                    payment: paymentGate,
                    status: "Pending",
                    date: new Date().toLocaleDateString()
                };
                
                // Save and sync order to localStorage
                let localInvoices = JSON.parse(localStorage.getItem("allInvoices")) || [];
                localInvoices.unshift(invoice);
                localStorage.setItem("allInvoices", JSON.stringify(localInvoices));

                setFinalizedInvoice(invoice);
                setCheckoutStep('invoice');
            };

            return (
                <div className="flex flex-col justify-between min-h-screen transition-all duration-300 dark:bg-medicalDark light:bg-lightBg">
                    
                    <nav className="glass-panel sticky top-0 z-50 px-6 lg:px-12 py-4 flex justify-between items-center shadow-2xl no-print border-b border-slate-200 dark:border-slate-900">
                        <div className="flex items-center space-x-3 cursor-pointer animate-float" onClick={() => { setView('home'); setCheckoutStep(null); setBookingStep(null); }}>
                            <div className="w-11 h-11 rounded-xl bg-gradient-to-tr from-brandTeal to-brandEmerald flex items-center justify-center text-white text-xl shadow-xl">
                                <i className="fa-solid fa-microscope"></i>
                            </div>
                            <span className="text-2xl font-black tracking-tighter text-slate-900 dark:text-white">BOOK<span className="text-brandTeal">MEET</span><span className="text-[10px] bg-cyan-500/20 text-brandTeal px-2 py-0.5 rounded-full ml-1 font-mono uppercase tracking-widest border border-brandTeal/30">PRO GRID</span></span>
                        </div>

                        <div className="hidden lg:flex items-center space-x-8 text-xs font-black uppercase tracking-widest text-slate-500 dark:text-slate-300">
                            <span onClick={() => { setView('home'); setCheckoutStep(null); setBookingStep(null); }} className={`hover:text-brandTeal cursor-pointer transition-all ${view === 'home' ? 'text-brandTeal border-b-2 border-brandTeal pb-1' : ''}`}>System Dashboard</span>
                            <span onClick={() => { setView('appointment'); setBookingStep(null); }} className={`hover:text-brandTeal cursor-pointer transition-all ${view === 'appointment' ? 'text-brandTeal border-b-2 border-brandTeal pb-1' : ''}`}>Doctor Registry Matrix</span>
                            <span onClick={() => { setView('pharmacy'); setCheckoutStep(null); }} className={`hover:text-brandTeal cursor-pointer transition-all ${view === 'pharmacy' ? 'text-brandTeal border-b-2 border-brandTeal pb-1' : ''}`}>Amazon Pharma Facility</span>
                            <span onClick={() => setView('diagnostics')} className={`hover:text-brandTeal cursor-pointer transition-all ${view === 'diagnostics' ? 'text-brandTeal border-b-2 border-brandTeal pb-1' : ''}`}>Bio-Assay Diagnostics</span>
                            <span onClick={() => setView('telemetry')} className={`hover:text-brandTeal cursor-pointer transition-all ${view === 'telemetry' ? 'text-brandTeal border-b-2 border-brandTeal pb-1' : ''}`}>Live Telemetry</span>
                            <span onClick={() => setView('emergency')} className="text-rose-500 font-black animate-pulse cursor-pointer border border-rose-500/30 px-3 py-1.5 rounded-xl bg-rose-500/10"><i className="fa-solid fa-heart-pulse mr-1.5"></i>Trauma Emergency 24x7</span>
                        </div>

                        <div className="flex items-center space-x-4">
                            <button onClick={() => setTheme(theme === 'dark' ? 'light' : 'dark')} className="p-3 rounded-xl bg-slate-200 dark:bg-medicalCard text-slate-800 dark:text-brandTeal hover:scale-105 border border-slate-300 dark:border-slate-800 transition-all">
                                {theme === 'dark' ? <i className="fa-solid fa-bolt-lightning text-amber-400"></i> : <i className="fa-solid fa-shield-cat text-indigo-600"></i>}
                            </button>

                            <div className="relative cursor-pointer p-3 bg-slate-200 dark:bg-medicalCard border border-slate-300 dark:border-slate-800 rounded-xl text-slate-700 dark:text-slate-200 group hover:border-brandTeal" onClick={() => { setView('pharmacy'); setCheckoutStep('cart'); }}>
                                <i className="fa-solid fa-boxes-stacked text-base group-hover:text-brandTeal"></i>
                                {cart.length > 0 && (
                                    <span className="absolute -top-1.5 -right-1.5 bg-cyberPink text-white font-bold text-[10px] w-5 h-5 rounded-full flex items-center justify-center border-2 border-medicalDark font-mono shadow-md">{cart.reduce((a, c) => a + c.qty, 0)}</span>
                                )}
                            </div>
                        </div>
                    </nav>

                    <div className="bg-slate-900 text-brandTeal text-[10px] uppercase font-bold tracking-widest py-2 px-4 overflow-hidden border-b border-brandTeal/10 no-print flex whitespace-nowrap">
                        <div className="animate-marquee flex gap-16">
                            <span><i className="fa-solid fa-signal text-brandEmerald"></i> Active Node Cluster: Maharashtra Zone-1</span>
                            <span><i className="fa-solid fa-lock text-brandEmerald"></i> HIPAA Cryptographic Endpoints Operational</span>
                            <span><i className="fa-solid fa-capsules text-cyberPink"></i> Generic Chemical Inventory Match Layer: 100% Vetted</span>
                            <span><i className="fa-solid fa-shield-virus text-brandTeal"></i> National Digital Health Mission Ayushman Bharat API Online</span>
                        </div>
                    </div>

                    <main className="flex-grow pb-24">
                        {view === 'home' && (
                            <HomeLayout 
                                setView={setView} 
                                selectedDistrict={selectedDistrict} setSelectedDistrict={setSelectedDistrict}
                                selectedSpec={selectedSpec} setSelectedSpec={setSelectedSpec}
                                mapQueryUrl={mapQueryUrl}
                                setActiveInfoBox={setActiveInfoBox}
                            />
                        )}
                        {view === 'appointment' && (
                            <AppointmentLayout 
                                filteredDoctors={filteredDoctors} visibleDocs={visibleDocs}
                                selectedDoctor={selectedDoctor} setSelectedDoctor={setSelectedDoctor}
                                selectedDistrict={selectedDistrict} setSelectedDistrict={setSelectedDistrict}
                                selectedSpec={selectedSpec} setSelectedSpec={setSelectedSpec}
                                searchQuery={searchQuery} setSearchQuery={setSearchQuery}
                                bookingStep={bookingStep} setBookingStep={setBookingStep}
                                appointmentForm={appointmentForm} setAppointmentForm={setAppointmentForm}
                                paymentGate={paymentGate} setPaymentGate={setPaymentGate}
                                finalizedBooking={finalizedBooking} setFinalizedBooking={setFinalizedBooking}
                                setView={setView}
                                initiateBookingOtpValidation={initiateBookingOtpValidation}
                            />
                        )}
                        {view === 'pharmacy' && (
                            <PharmacyLayout
